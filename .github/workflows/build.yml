name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Check Java Version
      run: java -version

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: |
        set -e
        for attempt in 1 2 3; do
          echo "Gradle build attempt $attempt/3"
          if ./gradlew --stacktrace assembleDebug; then
            exit 0
          fi
          if [ "$attempt" -lt 3 ]; then
            echo "Build failed, retrying after a short pause..."
            sleep 15
          fi
        done
        exit 1

    - name: Upload Build Artifact (APK)
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: TeamCode/build/outputs/apk/debug/TeamCode-debug.apk
